<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "P&L Control Center",
  "schemaVersion": 1,
  "description": "Where your money went: sales, payout, returns, winners, losers to cut, and reorder-before-you-run-out. Your SellerBoard, rebuilt from your own Amazon data.",
  "mcpTools": [
    "{{DRIVE_READ_TOOL}}"
  ],
  "mcpServerNames": [
    "Google Drive"
  ]
}
</script>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P&amp;L Control Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Warm-ledger design system -- shared verbatim across all three dashboard tiles.
   Fonts load via the Google Fonts <link> above (Cowork-allowlisted). */
  :root{
    --bg:#ece4d4; --paper:#faf6ed; --paper-2:#f4eee0; --paper-3:#eee5d4;
    --ink:#241a12; --soft:#5f554a; --faint:#948a7a;
    --line:#dcd3bf; --line-2:#e6dfcd; --line-3:#cabea6; --gray:#aaa48f;
    --orange:#c65d2e; --orange-deep:#9c441c; --orange-soft:#df8a52;
    --orange-wash:#f8e6d6; --orange-line:#e8c6a6;
    --green:#3a7d4f; --green-deep:#27593a; --green-wash:#e6efe2; --green-line:#bcd2bc;
    --yellow:#a4801c; --yellow-deep:#6a5212; --yellow-wash:#f3ebd2; --yellow-line:#ddcda0;
    --red:#a4493a; --red-deep:#7e3729; --red-wash:#f1e2db; --red-line:#dabdaf;
    --goal:#df8a52; --goal-deep:#9c441c; --goal-wash:#f8e6d6; --goal-line:#e8c6a6;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:"Hanken Grotesk",-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    --serif:"Instrument Serif",Georgia,"Times New Roman",serif;
    --maxw:1140px; --pad:34px;
    --emboss:inset 0 1px 0 rgba(255,255,255,.7), 0 1px 2px rgba(36,26,18,.06), 0 12px 26px -20px rgba(36,26,18,.45);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:var(--sans);color:var(--ink);
       background:var(--bg);
       background-image:radial-gradient(115% 70% at 50% -8%, #f3ecdd 0%, var(--bg) 58%);
       line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  /* ---- masthead ---- */
  header{padding:48px var(--pad) 0;max-width:var(--maxw);margin:0 auto}
  .eyebrow{display:flex;align-items:center;gap:13px;font-family:var(--mono);font-size:10.5px;
           font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(--orange);margin:0 0 18px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line-3);opacity:.75}
  h1{margin:0;font-family:var(--serif);font-weight:400;font-size:54px;letter-spacing:-.01em;line-height:1.02}
  .updated{font-family:var(--mono);color:var(--faint);font-size:11px;margin-top:16px;letter-spacing:.04em}

  /* ---- KPI strip ---- */
  .strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
         max-width:var(--maxw);margin:26px auto 0;padding:0 var(--pad)}
  .kpi{background:var(--paper);border:1px solid var(--line-3);border-radius:6px;
       padding:20px 22px;box-shadow:var(--emboss);
       display:flex;flex-direction:column;justify-content:space-between;gap:14px;min-height:128px;position:relative}
  .kpi .lab{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.13em;
            text-transform:uppercase;color:var(--faint);line-height:1.5}
  .kpi .val{font-family:var(--serif);font-weight:400;font-size:30px;letter-spacing:0;
            color:var(--ink);line-height:1.1}
  .kpi .val span{font-family:var(--sans);font-size:12.5px;color:var(--faint)}
  .kpi .sub{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.03em;margin-top:-4px}
  /* North-star = the money number, anchored dark + embossed */
  .kpi.star{background:linear-gradient(165deg,#33261a 0%,var(--ink) 70%);border-color:#3a2c1f;
       box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 16px 34px -22px rgba(36,26,18,.75)}
  .kpi.star .lab{color:rgba(247,242,231,.62)}
  .kpi.star .val{color:#f7f2e7}
  .kpi.star .val span{color:rgba(247,242,231,.55) !important}
  .kpi.star .sub{color:rgba(247,242,231,.5)}

  /* ---- tabs (editorial underline) ---- */
  nav{display:flex;gap:2px;flex-wrap:wrap;max-width:var(--maxw);margin:36px auto 0;padding:0 var(--pad);
      border-bottom:1px solid var(--line)}
  .tab{font-family:var(--sans);background:none;border:none;border-bottom:2px solid transparent;
       margin-bottom:-1px;color:var(--soft);padding:12px 16px;cursor:pointer;font-size:13.5px;font-weight:600;
       transition:color .15s,border-color .15s}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--ink);border-bottom-color:var(--orange)}

  /* ---- view panels ---- */
  main{max-width:var(--maxw);margin:0 auto;padding:30px var(--pad) 64px}
  .view{display:none;background:var(--paper);border:1px solid var(--line-3);border-radius:8px;
        padding:34px 36px;box-shadow:var(--emboss)}
  .view.active{display:block}
  .view h2{margin:0 0 6px;font-family:var(--serif);font-weight:400;font-size:32px;letter-spacing:-.01em;line-height:1.04}
  .view h3{font-size:12px;font-family:var(--mono);font-weight:500;text-transform:uppercase;letter-spacing:.1em;
           color:var(--faint);margin:26px 0 8px}
  .view .lead{color:var(--soft);margin:6px 0 22px;font-size:14.5px;max-width:760px}
  .livestat{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin:2px 0 20px;letter-spacing:.02em}

  /* ---- callouts ---- */
  .note{background:var(--paper-2);border:1px solid var(--line);padding:14px 17px;
        border-radius:7px;margin:16px 0;font-size:13.5px;color:var(--soft);line-height:1.6}
  .note b{color:var(--ink)}
  .note.warn{background:var(--yellow-wash);border-color:var(--yellow-line);color:#5d4a13}
  .note.warn b{color:var(--yellow-deep)}
  .note.goal{background:var(--orange-wash);border-color:var(--orange-line);color:#6e3417}
  .note.goal b{color:var(--orange-deep)}
  .note.lock{background:var(--paper-3);border-color:var(--line-3);color:var(--soft)}
  .err{color:var(--red-deep);background:var(--red-wash);border:1px solid var(--red-line);border-radius:8px;padding:12px;font-size:13px;white-space:pre-wrap}

  /* ---- settlement validation card ---- */
  .settle{border:1px solid var(--line-3);border-radius:9px;background:var(--paper-2);padding:20px 22px;box-shadow:var(--emboss);margin:4px 0 8px}
  .settle .period{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .settle .payout{font-family:var(--serif);font-size:38px;color:var(--ink);line-height:1.1;margin:6px 0 2px}
  .settle .payout small{font-family:var(--sans);font-size:13px;color:var(--soft)}
  .takebar{position:relative;height:26px;background:var(--green-wash);border:1px solid var(--green-line);border-radius:7px;overflow:hidden;margin:16px 0 6px}
  .takebar .fill{position:absolute;inset:0 0 0 auto;background:var(--orange-wash);border-left:1px solid var(--orange-line);
       display:flex;align-items:center;justify-content:flex-end;padding-right:11px;color:var(--orange-deep);font-family:var(--mono);font-size:11px;font-weight:500}
  .takebar .kept{position:absolute;left:11px;top:0;bottom:0;display:flex;align-items:center;color:var(--green-deep);font-family:var(--mono);font-size:11px;font-weight:500}

  /* ---- money grid + tables ---- */
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:10px 0 4px}
  @media(max-width:680px){.mgrid{grid-template-columns:1fr 1fr}}
  .mcell{background:var(--paper-2);border:1px solid var(--line-2);border-radius:7px;padding:14px 15px}
  .mcell .lab{font-family:var(--mono);font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--faint)}
  .mcell .v{font-family:var(--serif);font-size:24px;color:var(--ink);line-height:1.15;margin-top:6px}
  .mcell .v small{font-family:var(--sans);font-size:12px;color:var(--soft)}
  .mcell.pos .v{color:var(--green-deep)} .mcell.neg .v{color:var(--red-deep)}

  .tblwrap{overflow-x:auto;margin:6px 0}
  table.pt{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
  table.pt th{font-family:var(--mono);font-size:8.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);
        text-align:right;font-weight:500;padding:0 12px 8px 0;border-bottom:1px solid var(--line-3)}
  table.pt th.l{text-align:left}
  table.pt td{padding:10px 12px 10px 0;border-bottom:1px solid var(--line-2);vertical-align:middle;color:var(--ink);text-align:right;font-family:var(--mono);font-size:12.5px}
  table.pt td.nm{text-align:left;font-family:var(--sans);font-size:13.5px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  table.pt tr:last-child td{border-bottom:none}
  table.pt tr:hover td{background:var(--paper-2)}
  .pos{color:var(--green-deep)} .neg{color:var(--red-deep)}
  .lockcell{color:var(--faint);font-style:italic}
  .dos{font-weight:600;border-radius:999px;padding:2px 9px;font-size:11px}
  .dos.red{background:var(--red-wash);color:var(--red-deep);border:1px solid var(--red-line)}
  .dos.yellow{background:var(--yellow-wash);color:var(--yellow-deep);border:1px solid var(--yellow-line)}
  .dos.ok{background:var(--green-wash);color:var(--green-deep);border:1px solid var(--green-line)}

  #reload{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--soft);background:var(--paper);
       border:1px solid var(--line-3);border-radius:6px;padding:6px 14px;cursor:pointer}
  #reload:hover{color:var(--ink);background:var(--paper-2)}
  .lockchip{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;
       color:var(--orange-deep);background:var(--orange-wash);border:1px solid var(--orange-line);border-radius:5px;padding:2px 7px;margin-left:8px}
  .kpi,.mcell,tr{transition:transform .18s, box-shadow .18s}
  .kpi:hover{transform:translateY(-3px)}
  footer{font-family:var(--mono);max-width:var(--maxw);margin:0 auto;padding:0 var(--pad) 54px;
         color:var(--faint);font-size:11px;letter-spacing:.03em;line-height:1.7}

  @media(max-width:840px){ .strip{grid-template-columns:1fr} h1{font-size:42px} .view{padding:26px 22px} .view h2{font-size:26px} }
  @media(max-width:540px){ :root{--pad:18px} }
</style>
</head><body>
<header>
  <div class="eyebrow">Profit &amp; Loss</div>
  <h1>Where the money went</h1>
  <div class="updated" id="asof">Loading&hellip;</div>
</header>
<section class="strip" id="strip"></section>
<nav id="nav"></nav>
<main>
  <div class="livestat"><button id="reload">Reload</button> <span id="status"></span></div>
  <div id="out"></div>
  <footer>Sales &amp; returns from your Amazon All-Orders report, payout from your settlement report, stock from your FBA inventory, cost from your Bought sheet &mdash; read live from Google Drive on open. Your SellerBoard, rebuilt from your own data.</footer>
</main>
<script>
const FILE_ID = "{{PNL_FEED_FILE_ID}}";
const TOOL = "{{DRIVE_READ_TOOL}}";

function parseFeed(fileContent){
  // strip EVERY connector-added backslash that doesn't begin a valid JSON escape (feed is pure
  // ASCII + &#NNN; entities, so any stray backslash is connector damage) -- same fix as the other tiles.
  return JSON.parse(fileContent.replace(/\\(?!["\\\/bfnrtu])/g, ""));
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
function money(n){ if(n==null||n==="")return "&mdash;"; const v=Math.round(+n); return "$"+v.toLocaleString(); }
function money1(n){ if(n==null||n==="")return "&mdash;"; return "$"+(+n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fuse(elId, fn){ try{ return fn(); }catch(e){ return '<div class="err">Section failed: '+esc(e.message||e)+'</div>'; } }

let FEED=null, TAB="overview";

// map the compact per-ASIN arrays back to named fields using the feed's own `columns` order
function asObjs(tbl){
  const cols=(FEED.asins&&FEED.asins.columns)||[];
  const ix={}; cols.forEach((c,i)=>ix[c]=i);
  return (tbl||[]).map(r=>({
    asin:r[ix.asin], name:r[ix.name], u30:r[ix.u30], rev30:r[ix.rev30], vel:r[ix.vel],
    dos:r[ix.dos], stock:r[ix.stock], inbound:r[ix.inbound], ret:r[ix.ret_pct],
    cost:r[ix.cost], profit30:r[ix.profit30]
  }));
}
function profitCell(p){ return p==null ? '<span class="lockcell">&mdash;</span>' : '<span class="'+(p>=0?'pos':'neg')+'">'+money(p)+'</span>'; }
function dosBadge(d){ if(d==null) return '&mdash;'; const c=d<7?'red':d<14?'yellow':'ok'; return '<span class="dos '+c+'">'+d+'d</span>'; }

function kpiStrip(){
  const t30=FEED.totals.t30, mtd=FEED.totals.mtd, stl=FEED.totals.settlement, cg=FEED.cogs;
  // North-star: this month's GROSS margin (revenue - product cost) when cost is known, else revenue.
  // Amazon fees come off gross; the exact after-fee cash is the payout KPI beside it.
  let starLab, starVal, starSub;
  if(cg.available){ starLab="This month's gross"; starVal=money(mtd.gross); starSub=mtd.gross_margin_pct+"% margin · before Amazon fees"; }
  else { starLab="This month's revenue"; starVal=money(mtd.revenue); starSub=mtd.units+" units · margin unlocks after cost migration"; }
  const payV = stl ? money(stl.payout) : "&mdash;";
  const paySub = stl ? ("deposited "+esc(stl.deposit_date)) : "no closed period yet";
  return ''
   + '<div class="kpi star"><div class="lab">'+starLab+'</div><div class="val">'+starVal+'</div><div class="sub">'+esc(starSub)+'</div></div>'
   + '<div class="kpi"><div class="lab">Last payout</div><div class="val">'+payV+'</div><div class="sub">'+esc(paySub)+'</div></div>'
   + '<div class="kpi"><div class="lab">Last 30 days</div><div class="val">'+t30.units+' <span>units</span></div><div class="sub">'+money(t30.revenue)+' revenue · '+t30.ret_pct+'% returned</div></div>';
}

function viewOverview(){
  const t30=FEED.totals.t30, stl=FEED.totals.settlement, cg=FEED.cogs;
  let h='<div class="view active"><h2>The last payout</h2>';
  h+='<p class="lead">Check this against your bank &mdash; it comes straight from Amazon’s settlement report, so it matches your deposit to the penny. This is your real, after-fee cash.</p>';
  if(stl){
    h+='<div class="settle"><div class="period">Settlement period '+esc(stl.start)+' → '+esc(stl.end)+'</div>'
      +'<div class="payout">'+money1(stl.payout)+' <small>deposited '+esc(stl.deposit_date)+'</small></div>'
      +'<div class="note" style="margin:12px 0 0">The exact amount Amazon deposited &mdash; after every referral, FBA and storage fee and refund. It should match your bank to the penny.</div></div>';
  } else {
    h+='<div class="note">No closed settlement period yet &mdash; your first payout card appears once Amazon closes a period. Everything below is already live.</div>';
  }
  h+='<h3>Your margin, last 30 days</h3>';
  if(cg.available){
    h+='<div class="mgrid">'
      +'<div class="mcell"><div class="lab">Revenue</div><div class="v">'+money(t30.revenue)+'</div></div>'
      +'<div class="mcell neg"><div class="lab">− Product cost</div><div class="v">'+money(t30.cogs)+'</div></div>'
      +'<div class="mcell pos"><div class="lab">= Gross margin</div><div class="v">'+money(t30.gross)+' <small>'+t30.gross_margin_pct+'%</small></div></div>'
      +'<div class="mcell"><div class="lab">Units sold</div><div class="v">'+t30.units+'</div></div>'
      +'</div>';
    h+='<div class="note goal"><b>'+money(t30.gross)+' gross over 30 days</b> ('+t30.gross_margin_pct+'% of revenue), after product cost. <b>Amazon’s fees come off this</b> &mdash; your exact after-fee cash is the payout above. Product cost is exact from your Bought sheet ('+cg.coverage_pct+'% of revenue covered).</div>';
  } else {
    h+='<div class="mgrid">'
      +'<div class="mcell"><div class="lab">Revenue</div><div class="v">'+money(t30.revenue)+'</div></div>'
      +'<div class="mcell"><div class="lab">Units</div><div class="v">'+t30.units+'</div></div>'
      +'<div class="mcell '+(t30.ret_pct>8?'neg':'')+'"><div class="lab">Returns</div><div class="v">'+t30.ret_pct+'%</div></div>'
      +'<div class="mcell pos"><div class="lab">Reimbursed</div><div class="v">'+money(t30.reimb)+'</div></div>'
      +'</div>';
    h+='<div class="note lock"><b>Margin is locked.</b> '+esc(cg.note)+' <span class="lockchip">unlocks after migration</span></div>';
  }
  h+='<h3>Returns &amp; recovery</h3><div class="mgrid">'
    +'<div class="mcell '+(t30.ret_pct>8?'neg':'')+'"><div class="lab">Return rate (30d)</div><div class="v">'+t30.ret_pct+'% <small>'+t30.ret_units+' u</small></div></div>'
    +'<div class="mcell pos"><div class="lab">Reimbursed (30d)</div><div class="v">'+money(t30.reimb)+'</div></div>'
    +'<div class="mcell"><div class="lab">Units sold (30d)</div><div class="v">'+t30.units+'</div></div>'
    +'<div class="mcell"><div class="lab">Revenue (30d)</div><div class="v">'+money(t30.revenue)+'</div></div>'
    +'</div>';
  h+='</div>';
  return h;
}

function tableView(title, lead, rowsObj, kind){
  let h='<div class="view active"><h2>'+esc(title)+'</h2><p class="lead">'+lead+'</p>';
  if(!rowsObj.length){ return h+'<div class="note">Nothing here yet &mdash; check back after your next daily run.</div></div>'; }
  h+='<div class="tblwrap"><table class="pt"><thead><tr>';
  if(kind==="replenish"){
    h+='<th class="l">Product</th><th>Days left</th><th>In stock</th><th>Inbound</th><th>Sold/day</th><th>30d units</th>';
  } else {
    h+='<th class="l">Product</th><th>30d units</th><th>30d revenue</th><th>Gross/mo</th><th>Return%</th><th>In stock</th>';
  }
  h+='</tr></thead><tbody>';
  for(const r of rowsObj){
    h+='<tr><td class="nm" title="'+esc(r.asin)+'">'+esc(r.name)+'</td>';
    if(kind==="replenish"){
      h+='<td>'+dosBadge(r.dos)+'</td><td>'+(r.stock==null?'&mdash;':r.stock)+'</td><td>'+(r.inbound?r.inbound:'&mdash;')+'</td><td>'+(r.vel||0)+'</td><td>'+r.u30+'</td>';
    } else {
      h+='<td>'+r.u30+'</td><td>'+money(r.rev30)+'</td><td>'+profitCell(r.profit30)+'</td><td'+(r.ret>8?' class="neg"':'')+'>'+r.ret+'%</td><td>'+(r.stock==null?'&mdash;':r.stock)+'</td>';
    }
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  return h+'</div>';
}

function viewWinners(){ return tableView("Winners","Your top sellers by revenue over the last 30 days"+(FEED.cogs.available?" — gross/mo = revenue − product cost (Amazon fees come off gross).":". Gross unlocks after your cost migration."), asObjs(FEED.asins.top_rev), "rev"); }
function viewLosers(){
  const c=FEED.asins.counts;
  const lead='Items with stock but the <b>lowest</b> 30-day revenue &mdash; your cut candidates. '
    +'<b>'+c.zero_sellers_with_stock+'</b> of your '+c.catalog+' catalog ASINs have inventory but <b>zero</b> sales in 30 days.';
  return tableView("Losers to cut", lead, asObjs(FEED.asins.bottom), "rev");
}
function viewReplenish(){ return tableView("Reorder soon","Selling stock that runs out within ~3 weeks, soonest first. Days-left = current FBA stock ÷ your recent sell-through.", asObjs(FEED.asins.replenish), "replenish"); }

function renderTab(){
  const map={overview:viewOverview,winners:viewWinners,losers:viewLosers,replenish:viewReplenish};
  document.getElementById("out").innerHTML = fuse("out", map[TAB]||viewOverview);
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on", b.dataset.t===TAB));
}
function buildNav(){
  const tabs=[["overview","Overview"],["winners","Winners"],["losers","Losers to cut"],["replenish","Reorder soon"]];
  document.getElementById("nav").innerHTML = tabs.map(([k,l])=>'<button class="tab" data-t="'+k+'">'+l+'</button>').join("");
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{ TAB=b.dataset.t; renderTab(); });
}

function render(f){
  FEED=f;
  if(!f || f.status==="awaiting first robot run" || !f.totals){
    document.getElementById("strip").innerHTML="";
    document.getElementById("nav").innerHTML="";
    document.getElementById("out").innerHTML='<div class="view active"><div class="note"><b>Awaiting your first robot run.</b> The daily routine will fill this in with your sales, payout, winners, losers and reorder list &mdash; nothing for you to do.</div></div>';
    return;
  }
  document.getElementById("strip").innerHTML = fuse("strip", kpiStrip);
  buildNav();
  renderTab();
}

async function load(){
  const st=document.getElementById("status"); st.textContent="Loading…";
  try{
    const r = await window.cowork.callMcpTool(TOOL, { fileId: FILE_ID });
    if(r.isError) throw new Error("connector error: "+JSON.stringify(r.content));
    const wrapper = r.structuredContent ?? JSON.parse(r.content[0].text);
    const f = parseFeed(wrapper.fileContent);
    document.getElementById("asof").textContent = "live · rebuilt "+(f.as_of||f.generated_at||"")+" from your Amazon data";
    render(f);
    st.textContent = "✓ live · "+new Date().toLocaleTimeString();
  }catch(e){
    st.textContent="✗ failed";
    document.getElementById("out").innerHTML='<div class="err">Live load failed:\n'+esc(e.message||e)+'\n\nThis tile reads its data live inside Cowork — open it there.</div>';
  }
}
document.getElementById("reload").onclick = load;
load();
</script>
</body></html>
