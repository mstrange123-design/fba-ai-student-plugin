<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Cash Flow Cycle",
  "schemaVersion": 1,
  "description": "Buy-to-bank cash cycle vs the 55-day credit-card float. From the Item Journey Repo. Keep/kill by SKU.",
  "mcpTools": [
    "{{DRIVE_READ_TOOL}}"
  ],
  "mcpServerNames": [
    "Google Drive"
  ]
}
</script>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cash Flow Cycle vs 55-Day Float</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Warm-ledger design system -- shared look across both dashboard tiles.
   Fonts load via the Google Fonts <link> in each tile's <head> (Cowork-allowlisted). */

  :root{
    /* warm ledger paper */
    --bg:#ece4d4; --paper:#faf6ed; --paper-2:#f4eee0; --paper-3:#eee5d4;
    --ink:#241a12; --soft:#5f554a; --faint:#948a7a;
    --line:#dcd3bf; --line-2:#e6dfcd; --line-3:#cabea6; --gray:#aaa48f;
    /* ORANGE = brand / money / where you lean in */
    --orange:#c65d2e; --orange-deep:#9c441c; --orange-soft:#df8a52;
    --orange-wash:#f8e6d6; --orange-line:#e8c6a6;
    /* green kept ONLY for "ran clean" status */
    --green:#3a7d4f; --green-deep:#27593a; --green-wash:#e6efe2; --green-line:#bcd2bc;
    /* status supports */
    --yellow:#a4801c; --yellow-deep:#6a5212; --yellow-wash:#f3ebd2; --yellow-line:#ddcda0;
    --red:#a4493a; --red-deep:#7e3729; --red-wash:#f1e2db; --red-line:#dabdaf;
    /* "goal / next" reuses the brand orange */
    --goal:#df8a52; --goal-deep:#9c441c; --goal-wash:#f8e6d6; --goal-line:#e8c6a6;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:"Hanken Grotesk",-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    --serif:"Instrument Serif",Georgia,"Times New Roman",serif;
    --maxw:1140px; --pad:34px;
    --emboss:inset 0 1px 0 rgba(255,255,255,.7), 0 1px 2px rgba(36,26,18,.06), 0 12px 26px -20px rgba(36,26,18,.45);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:var(--sans);color:var(--ink);
       background:var(--bg);
       background-image:radial-gradient(115% 70% at 50% -8%, #f3ecdd 0%, var(--bg) 58%);
       line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  /* ---- masthead ---- */
  header{padding:48px var(--pad) 0;max-width:var(--maxw);margin:0 auto}
  .eyebrow{display:flex;align-items:center;gap:13px;font-family:var(--mono);font-size:10.5px;
           font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(--orange);margin:0 0 18px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line-3);opacity:.75}
  h1{margin:0;font-family:var(--serif);font-weight:400;font-size:54px;letter-spacing:-.01em;line-height:1.02}
  .updated{font-family:var(--mono);color:var(--faint);font-size:11px;margin-top:16px;letter-spacing:.04em}

  /* ---- KPI strip ---- */
  .strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
         max-width:var(--maxw);margin:26px auto 0;padding:0 var(--pad)}
  .kpi{background:var(--paper);border:1px solid var(--line-3);border-radius:6px;
       padding:20px 22px;box-shadow:var(--emboss);
       display:flex;flex-direction:column;justify-content:space-between;gap:18px;min-height:128px;position:relative}
  .kpi .lab{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.13em;
            text-transform:uppercase;color:var(--faint);line-height:1.5}
  .kpi .val{font-family:var(--serif);font-weight:400;font-size:30px;letter-spacing:0;
            color:var(--ink);line-height:1.1}
  .kpi .val span{font-family:var(--sans);font-size:12.5px;color:var(--faint)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:11px;
       vertical-align:middle;position:relative;top:-4px}
  .g{background:var(--green)} .y{background:var(--yellow)} .goal{background:var(--goal)} .k{background:var(--orange)}
  /* North-star = the money number, anchored dark + embossed */
  .kpi:first-child{background:linear-gradient(165deg,#33261a 0%,var(--ink) 70%);border-color:#3a2c1f;
       box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 16px 34px -22px rgba(36,26,18,.75)}
  .kpi:first-child .lab{color:rgba(247,242,231,.62)}
  .kpi:first-child .val{color:#f7f2e7}
  .kpi:first-child .val span{color:rgba(247,242,231,.55) !important}

  /* ---- tabs (editorial underline) ---- */
  nav{display:flex;gap:2px;flex-wrap:wrap;max-width:var(--maxw);margin:36px auto 0;padding:0 var(--pad);
      border-bottom:1px solid var(--line)}
  .tab{font-family:var(--sans);background:none;border:none;border-bottom:2px solid transparent;
       margin-bottom:-1px;color:var(--soft);padding:12px 16px;cursor:pointer;font-size:13.5px;font-weight:600;
       transition:color .15s,border-color .15s}
  .tab:hover{color:var(--ink)}
  .tab.on{color:var(--ink);border-bottom-color:var(--orange)}

  /* ---- view panels ---- */
  main{max-width:var(--maxw);margin:0 auto;padding:30px var(--pad) 64px}
  .view{display:none;background:var(--paper);border:1px solid var(--line-3);border-radius:8px;
        padding:36px 38px;box-shadow:var(--emboss)}
  .view.active{display:block}
  .view h2{margin:0 0 22px;font-family:var(--serif);font-weight:400;font-size:34px;letter-spacing:-.01em;line-height:1.04}
  .view h3{font-size:13px;font-family:var(--mono);font-weight:500;text-transform:uppercase;letter-spacing:.1em;
           color:var(--faint);margin:28px 0 8px}
  .view .lead{color:var(--soft);margin:0 0 24px;font-size:15.5px;max-width:760px}
  .livestat{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin:-6px 0 22px;letter-spacing:.02em}

  .subtabs{display:inline-flex;gap:0;margin:0 0 22px;border:1px solid var(--line);border-radius:6px;
           background:var(--paper-2);padding:3px}
  .sub{font-family:var(--sans);border:none;background:none;color:var(--soft);
       padding:7px 16px;border-radius:4px;cursor:pointer;font-size:12.5px;font-weight:600;transition:color .15s,background .15s}
  .sub:hover{color:var(--ink)}
  .sub.on{background:var(--paper);color:var(--orange-deep);box-shadow:0 1px 2px rgba(36,26,18,.12)}
  .subview{display:none} .subview.active{display:block}

  /* ---- flowchart (the whole thing) ---- */
  .treewrap{overflow-x:auto;padding:14px 0 6px;margin:2px 0 2px}
  ul.tree, ul.tree ul{list-style:none;margin:0;padding:0}
  ul.tree{display:flex;justify-content:center;min-width:max-content;padding:0 4px}
  ul.tree ul{display:flex;justify-content:center;padding-top:28px;position:relative}
  ul.tree li{position:relative;padding:28px 16px 0;text-align:center}
  ul.tree li::before,
  ul.tree li::after{content:"";position:absolute;top:0;right:50%;width:50%;height:28px;border-top:2px solid var(--line-3)}
  ul.tree li::after{right:auto;left:50%;border-left:2px solid var(--line-3)}
  ul.tree li::before{border-right:2px solid var(--line-3)}
  ul.tree li:only-child{padding-top:28px}
  ul.tree li:only-child::before,
  ul.tree li:only-child::after{display:none}
  ul.tree li:first-child::before,
  ul.tree li:last-child::after{border:0 none}
  ul.tree li:last-child::before{border-right:2px solid var(--line-3);border-radius:0 7px 0 0}
  ul.tree li:first-child::after{border-radius:7px 0 0 0}
  ul.tree ul::before{content:"";position:absolute;top:0;left:50%;width:0;height:28px;border-left:2px solid var(--line-3)}
  ul.tree>li{padding-top:0}
  ul.tree>li::before,ul.tree>li::after{display:none}
  .node{position:relative;display:inline-block;min-width:118px;padding:13px 19px;border-radius:7px;
        background:var(--paper);border:1px solid var(--line-3);box-shadow:var(--emboss);white-space:nowrap;
        font-weight:600;font-size:13.5px;color:var(--ink)}
  .node em{display:block;font-style:normal;font-family:var(--mono);font-size:10px;letter-spacing:.04em;
           font-weight:500;opacity:.72;margin-top:5px}
  /* downward arrowhead into every non-root node */
  ul.tree ul li > .node::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);
        border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid var(--line-3)}
  .node.root{background:linear-gradient(165deg,#33261a,var(--ink));border-color:#3a2c1f;color:#f7f2e7;
        font-family:var(--serif);font-weight:400;font-size:19px;padding:13px 28px;
        box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 14px 30px -20px rgba(36,26,18,.7)}
  .node.money{background:var(--orange-wash);border-color:var(--orange-line);color:var(--orange-deep)}
  .node.money em{color:var(--orange-deep);opacity:.85}
  .node.next{background:var(--paper);border:1.5px dashed var(--orange-line);color:var(--orange-deep)}
  .node.next em{color:var(--orange-deep);opacity:.85}
  .node.calm{background:var(--paper-2);border-color:var(--line);color:var(--soft);box-shadow:0 1px 2px rgba(36,26,18,.05)}

  /* ---- legend ---- */
  .legend{display:flex;flex-wrap:wrap;align-items:center;gap:7px 15px;margin-top:24px;padding:12px 16px;
          border:1px solid var(--line-2);border-radius:9px;background:var(--paper-2);
          font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--soft)}
  .legend span{display:inline-flex;align-items:center;gap:8px;white-space:nowrap}
  .legend .sep{width:1px;height:13px;padding:0;background:var(--line-3);opacity:.6;flex:0 0 auto}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block;flex:0 0 auto}
  .legend i.dotk{width:9px;height:9px;border-radius:50%;display:inline-block;flex:0 0 auto}
  .legend i.dotk.ok{background:var(--green)} .legend i.dotk.warn{background:#c0962c} .legend i.dotk.bad{background:var(--red)}

  /* ---- callouts ---- */
  .note{background:var(--paper-2);border:1px solid var(--line);padding:14px 17px;
        border-radius:7px;margin:18px 0;font-size:13.5px;color:var(--soft);line-height:1.6}
  .note b{color:var(--ink)}
  .note.warn{background:var(--yellow-wash);border-color:var(--yellow-line);color:#5d4a13}
  .note.warn b{color:var(--yellow-deep)}
  .note.goal{background:var(--orange-wash);border-color:var(--orange-line);color:#6e3417}
  .note.goal b{color:var(--orange-deep)}

  ul.points{margin:10px 0 0;padding-left:20px} ul.points li{margin:8px 0;font-size:14.5px;color:var(--soft)}
  ul.points b{color:var(--ink)}
  .ok{color:var(--green);font-weight:600}
  code{font-family:var(--mono);background:var(--paper-3);padding:2px 7px;border-radius:4px;
       font-size:12px;color:var(--orange-deep);border:1px solid var(--line-2)}
  footer{font-family:var(--mono);max-width:var(--maxw);margin:0 auto;padding:0 var(--pad) 54px;
         color:var(--faint);font-size:11px;letter-spacing:.03em;line-height:1.7}

  /* ---- flow / step boxes (engine emits .flow .fbox .ok/.warn/.bad/.line .arr .t .m) ---- */
  .flow{display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin:12px 0 6px}
  .col{display:flex;flex-direction:column;gap:9px}
  .fbox{border:1px solid var(--line-3);border-radius:6px;padding:12px 15px;min-width:124px;max-width:252px;
        background:var(--paper);font-size:13px;color:var(--ink);box-shadow:var(--emboss)}
  .fbox .t{font-weight:600;line-height:1.3}
  .fbox .m{font-size:11px;margin-top:5px;line-height:1.45;opacity:.74;font-family:var(--mono);letter-spacing:.01em}
  .fbox.ok{background:var(--green-wash);border-color:var(--green-line);color:var(--green-deep)}
  .fbox.warn{background:var(--yellow-wash);border-color:var(--yellow-line);color:var(--yellow-deep)}
  .fbox.bad{background:var(--red-wash);border-color:var(--red-line);color:var(--red-deep)}
  .fbox.line{background:var(--paper);border-color:var(--line-3)}
  .fbox.target{background:var(--orange-wash);border-color:var(--orange-line);color:var(--orange-deep)}
  .arr{color:var(--line-3);font-size:18px;flex:0 0 auto;font-family:var(--serif)}
  .watchers{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
  .watch{border:1px solid var(--line);border-radius:6px;padding:10px 14px;font-size:12px;
         background:var(--paper-2);max-width:400px;line-height:1.5;color:var(--soft)}
  .watch b{color:var(--ink)}

  @media(max-width:840px){
    .strip{grid-template-columns:1fr}
    h1{font-size:42px}
    .view{padding:26px 22px}
    .view h2{font-size:28px}
  }
  @media(max-width:540px){
    :root{--pad:18px}
  }

  /* ---- blocker banner (where it's stuck) ---- */
  .bbar{max-width:var(--maxw);margin:22px auto 0;padding:0 var(--pad)}
  .blocker{display:flex;align-items:center;flex-wrap:wrap;gap:10px 13px;padding:13px 18px;border-radius:8px;
           font-size:13px;border:1px solid var(--red-line);background:var(--red-wash);color:var(--red-deep);box-shadow:var(--emboss)}
  .blocker.clear{border-color:var(--green-line);background:var(--green-wash);color:var(--green-deep)}
  .blocker b{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  .bdot{width:9px;height:9px;border-radius:50%;background:var(--red);flex:0 0 auto;animation:bpulse 2.4s infinite}
  .blocker.clear .bdot{background:var(--green);animation:none}
  .bitem{font-family:var(--mono);font-size:11px;background:rgba(255,255,255,.5);border:1px solid var(--red-line);
         padding:4px 11px;border-radius:999px;letter-spacing:.01em}
  @keyframes bpulse{0%{box-shadow:0 0 0 0 rgba(164,73,58,.4)}70%{box-shadow:0 0 0 7px rgba(164,73,58,0)}100%{box-shadow:0 0 0 0 rgba(164,73,58,0)}}

  /* ---- shape system: skill / you / decision + status ---- */
  .kind{display:block;width:fit-content;margin:0 auto 7px;font-family:var(--mono);font-size:8px;letter-spacing:.14em;
        text-transform:uppercase;padding:2px 7px;border-radius:5px;border:1px solid var(--line-3);color:var(--faint);background:var(--paper-3)}
  .kind.k-you{color:var(--orange-deep);border-color:var(--orange-line);background:var(--orange-wash)}
  .node.you{border-radius:999px;padding:13px 24px;background:var(--paper-2);border-color:var(--line-3)}
  .st{display:block;font-family:var(--mono);font-size:10px;font-weight:500;margin-top:8px;letter-spacing:.02em}
  .st.ok{color:var(--green-deep)} .st.warn{color:var(--yellow-deep)} .st.bad{color:var(--red-deep)}
  .node.stop{background:var(--red-wash);border-color:var(--red-line)}
  .diamond{position:relative;display:inline-flex;align-items:center;justify-content:center;width:158px;height:158px}
  .diamond::before{content:"";position:absolute;inset:23px;transform:rotate(45deg);background:var(--orange-wash);
        border:1.5px solid var(--orange-line);border-radius:13px;box-shadow:var(--emboss);transition:transform .2s,box-shadow .2s}
  .diamond:hover::before{transform:rotate(45deg) scale(1.04);box-shadow:0 16px 30px -14px rgba(36,26,18,.5)}
  .diamond>span{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;max-width:120px;text-align:center;color:var(--orange-deep)}
  .diamond b{font-weight:600;font-size:13.5px;line-height:1.2;white-space:nowrap}
  .diamond i{font-style:normal;font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;opacity:.8}
  .legend i.shape-r{width:17px;height:11px;border:1.5px solid var(--line-3);background:var(--paper);border-radius:2px;display:inline-block}
  .legend i.shape-p{width:19px;height:12px;border:1.5px solid var(--orange-line);background:var(--orange-wash);border-radius:999px;display:inline-block}
  .legend i.shape-d{width:12px;height:12px;border:1.5px solid var(--orange-line);background:var(--orange-wash);transform:rotate(45deg);display:inline-block;border-radius:2px}

  /* ---- Inside FBA reads top-to-bottom, styled to match the trees ---- */
  #fba .flow{flex-direction:column;flex-wrap:nowrap;align-items:center;gap:0}
  /* hide the engine's text arrows — we draw a real connector spine instead */
  #fba .arr{width:0;height:22px;font-size:0;color:transparent;position:relative;margin:0}
  #fba .arr::before{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:2px solid var(--line-3)}
  #fba .arr::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);
        border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid var(--line-3)}
  #fba .fbox{position:relative;min-width:230px;max-width:340px;text-align:center;padding:13px 22px;border-radius:8px;
        box-shadow:var(--emboss);font-size:14px;font-weight:600}
  #fba .fbox .t{font-weight:600}
  #fba .fbox .m{margin-top:6px;opacity:.7}
  #fba .fbox:hover{transform:translateY(-3px) scale(1.02);z-index:2}
  /* shape + actor language, driven by the engine's own classes:
     grey/human step (.line) = YOU = pill ; status-colored skill step = SKILL = rectangle */
  #fba .fbox::before{content:"skill";display:block;width:fit-content;margin:0 auto 8px;font-family:var(--mono);
        font-size:8px;letter-spacing:.14em;text-transform:uppercase;padding:2px 7px;border-radius:5px;
        border:1px solid var(--line-3);color:var(--faint);background:var(--paper-3)}
  #fba .fbox.line{border-radius:999px;background:var(--paper-2)}
  #fba .fbox.line::before{content:"you";color:var(--orange-deep);border-color:var(--orange-line);background:var(--orange-wash)}

  /* ---- quiet motion ---- */
  .kpi,.node,.fbox{transition:transform .2s, box-shadow .2s}
  .kpi:hover{transform:translateY(-3px)}
  .node:hover{transform:translateY(-3px) scale(1.02);z-index:2}
  .dot.k{animation:kpulse 2.8s infinite}
  @keyframes kpulse{0%{box-shadow:0 0 0 0 rgba(198,93,46,.45)}70%{box-shadow:0 0 0 7px rgba(198,93,46,0)}100%{box-shadow:0 0 0 0 rgba(198,93,46,0)}}
  @media(prefers-reduced-motion:reduce){.bdot,.dot.k{animation:none}}

  /* ---- "The machine" — system map of every automated job ---- */
  #machine .grp{margin:32px 0 6px}
  #machine .gnote{font-size:13px;color:var(--soft);margin:0 0 10px;max-width:760px}
  #machine table.jobs{width:100%;border-collapse:collapse;font-size:13px;margin:4px 0}
  #machine table.jobs th{font-family:var(--mono);font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;
        color:var(--faint);text-align:left;font-weight:500;padding:0 14px 7px 0;border-bottom:1px solid var(--line-3)}
  #machine table.jobs td{padding:11px 14px 11px 0;border-bottom:1px solid var(--line-2);vertical-align:top;
        color:var(--soft);line-height:1.5}
  #machine table.jobs tr:last-child td{border-bottom:none}
  #machine .when{font-family:var(--mono);font-size:11.5px;color:var(--orange-deep);white-space:nowrap}
  #machine .jn{font-weight:600;color:var(--ink);display:block}
  #machine .eng{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);
        display:inline-block;margin-top:5px;padding:2px 7px;border-radius:5px;border:1px solid var(--line-3);background:var(--paper-3)}
  #machine .eng.routine{color:var(--orange-deep);border-color:var(--orange-line);background:var(--orange-wash)}
  #machine .wr{font-family:var(--mono);font-size:11px;color:var(--soft)}
  #machine .phase{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
        color:var(--orange-deep);font-weight:600;margin:20px 0 2px}
  #machine .phase span{color:var(--faint);font-weight:400;text-transform:none;letter-spacing:0}
  #machine ul.steps{list-style:none;margin:6px 0 0;padding:0}
  #machine ul.steps li{display:flex;gap:12px;align-items:baseline;padding:8px 0;
        border-bottom:1px solid var(--line-2);font-size:14px;color:var(--soft);line-height:1.45}
  #machine ul.steps li:last-child{border-bottom:none}
  #machine ul.steps .sn{font-family:var(--mono);font-size:11px;color:var(--orange-deep);min-width:36px;font-weight:500;flex:0 0 auto}
  #machine ul.steps b{color:var(--ink);font-weight:600}
  #machine .gate{font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--yellow-deep);
        border:1px solid var(--yellow-line);background:var(--yellow-wash);padding:1px 6px;border-radius:4px;margin-left:5px;white-space:nowrap}
  #machine .good{font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--green-deep);
        border:1px solid var(--green-line);background:var(--green-wash);padding:1px 6px;border-radius:4px;margin-left:5px;white-space:nowrap}
</style>
<style>
  /* tile-specific, kit-token only */
  #reload{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--soft);background:var(--paper);
       border:1px solid var(--line-3);border-radius:6px;padding:6px 14px;cursor:pointer}
  #reload:hover{color:var(--ink);background:var(--paper-2)}
  .ccbar{position:relative;height:30px;background:var(--paper-3);border:1px solid var(--line-3);border-radius:7px;overflow:hidden;margin:2px 0 4px}
  .ccbar .fill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--green),var(--green-deep));
       display:flex;align-items:center;padding-left:12px;color:#f7f2e7;font-family:var(--mono);font-size:11px;font-weight:500}
  .ccbar .due{position:absolute;top:-3px;bottom:-3px;left:100%;width:2px;background:var(--red)}
  .ccbar-lbl{font-family:var(--mono);font-size:10px;color:var(--red-deep);text-align:right;margin:0 0 4px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
  @media(max-width:680px){.twocol{grid-template-columns:1fr}}
  .r{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid var(--line-2);font-size:13.5px}
  .r:first-of-type{border-top:none}
  .r .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;color:var(--ink)}
  .r .d{font-family:var(--mono);font-weight:600;width:48px;text-align:right}
  .r .d.ok{color:var(--green-deep)} .r .d.over{color:var(--red-deep)}
  .r .u{font-family:var(--mono);font-size:11px;color:var(--faint);width:52px;text-align:right}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chip{font-family:var(--mono);font-size:11px;background:var(--red-wash);color:var(--red-deep);
       border:1px solid var(--red-line);border-radius:999px;padding:4px 11px}
  .err{color:var(--red-deep);background:var(--red-wash);border:1px solid var(--red-line);border-radius:8px;padding:12px;font-size:13px;white-space:pre-wrap}
</style>
<style>
/* Clean-gray unification (2026-07-23): drop the warm-ledger paper look and match the Lifecycle
   Stages board — system fonts, gray/white surfaces, green as the single money accent. Purely a
   re-map of the design tokens plus the few hard-coded warm gradients; no DOM/JS/token changes.
   Delete this block to restore the warm-ledger look. */
  :root{
    --bg:#f9fafb; --paper:#ffffff; --paper-2:#f9fafb; --paper-3:#f3f4f6;
    --ink:#1f2937; --soft:#6b7280; --faint:#9ca3af; --gray:#9ca3af;
    --line:#e5e7eb; --line-2:#f3f4f6; --line-3:#d1d5db;
    /* accent = money = green (was orange) */
    --orange:#16a34a; --orange-deep:#065f46; --orange-soft:#4ade80; --orange-wash:#f0fdf4; --orange-line:#bbf7d0;
    --green:#16a34a; --green-deep:#065f46; --green-wash:#f0fdf4; --green-line:#bbf7d0;
    --yellow:#d97706; --yellow-deep:#92400e; --yellow-wash:#fffbeb; --yellow-line:#fde68a;
    --red:#dc2626; --red-deep:#b91c1c; --red-wash:#fef2f2; --red-line:#fecaca;
    --goal:#16a34a; --goal-deep:#065f46; --goal-wash:#f0fdf4; --goal-line:#bbf7d0;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --emboss:0 1px 3px rgba(20,24,40,.06);
  }
  body{background:var(--bg) !important;background-image:none !important}
  h1{font-weight:700 !important;font-size:30px !important;letter-spacing:-.01em}
  .view h2{font-weight:700 !important}
  /* dark north-star cards were a warm-brown gradient — make them clean slate */
  .kpi:first-child{background:linear-gradient(165deg,#374151 0%,#1f2937 75%) !important;border-color:#1f2937 !important}
  .node.root{background:linear-gradient(165deg,#374151,#1f2937) !important;border-color:#1f2937 !important;font-family:var(--sans) !important;font-weight:700 !important}
  /* per-SKU payback table (2026-07-23) */
  .sktbl{overflow-x:auto;margin-top:8px}
  table.sk{width:100%;border-collapse:collapse;font-size:12.5px;min-width:520px}
  table.sk th{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);text-align:right;font-weight:600;padding:0 10px 7px 0;border-bottom:1px solid var(--line-3)}
  table.sk th.l{text-align:left}
  table.sk td{padding:7px 10px 7px 0;border-bottom:1px solid var(--line-2);text-align:right;color:var(--ink);font-variant-numeric:tabular-nums}
  table.sk td.l{text-align:left}
  table.sk td.nm{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  table.sk tr:hover td{background:var(--paper-2)}
  table.sk tr.free td{background:var(--red-wash)}
  table.sk td.fz{color:var(--red-deep);font-weight:600}
  .freetag{font-family:var(--mono);font-size:9px;color:var(--red-deep);border:1px solid var(--red-line);background:#fff;border-radius:999px;padding:1px 7px;margin-left:6px;white-space:nowrap}
  .tb{font-size:11px;font-weight:600;white-space:nowrap}
  .tb.up{color:var(--green-deep)} .tb.dn{color:var(--red-deep)} .tb.fl{color:var(--soft)} .tb.mut{color:var(--faint)}
</style>
</head><body>
<header>
  <div class="eyebrow">Cash Flow Cycle</div>
  <h1 id="h1title">Buy &rarr; bank vs your card float</h1>
  <div class="updated" id="asof">Loading&hellip;</div>
</header>
<section class="strip" id="strip"></section>
<main>
  <div class="livestat"><button id="reload">Reload</button> <span id="status"></span></div>
  <div id="out"></div>
  <footer>Real per-unit dates from your Item Journey Repo (buy &rarr; bank chain), read live from Google Drive on open.</footer>
</main>
<script>
const FILE_ID = "{{CASH_FLOW_FEED_FILE_ID}}";
const TOOL = "{{DRIVE_READ_TOOL}}";
// No-bank-feed switch (baked by the wizard). The buy->bank cash cycle needs the "money landed
// in the bank" date, which only a bank feed (Monarch) can supply -- Amazon reports when it PAYS
// OUT, not when the cash lands. Without it every cycle metric reads 0 and frozen-capital inflates,
// which looks broken. When false we show an honest "connect a bank feed" state instead.
const HAS_BANK_FEED = {{HAS_BANK_FEED}};
// When true, "money in bank" is ESTIMATED (Amazon transfer date + 1 business day) rather than
// confirmed by a real bank feed -- the cash cycle still shows, but labeled as an estimate.
const BANK_FEED_IS_ESTIMATE = {{BANK_FEED_IS_ESTIMATE}};

function parseFeed(fileContent){
  // STRETCH FABRIC: strip EVERY connector-added backslash that doesn't begin a valid JSON escape —
  // a fixed un-escape list silently killed the lifecycle tile the day a feed carried a char it
  // didn't know (field 2026-07-10). The robot's feed is pure ASCII + &#NNN; entities, so every
  // stray backslash in the connector output is connector damage to remove.
  return JSON.parse(fileContent.replace(/\\(?!["\\\/bfnrtu])/g, ""));
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

function rowsHtml(list, cls){
  return (list||[]).map(r =>
    `<div class="r"><span class="nm">${esc(r.name)}</span>`
    + `<span class="d ${cls}">${esc(r.days)}d</span>`
    + `<span class="u">${esc(r.units)} u</span></div>`).join("") || '<div class="r"><span class="nm">&mdash;</span></div>';
}
function kpi(lab, val, unit){
  return `<div class="kpi"><div class="lab">${lab}</div><div class="val">${val}<span>${unit||""}</span></div></div>`;
}

function render(f){
  // STRAP: the user's REAL card float rides the feed (config float_days). 55 was the coach's
  // cycle — used only as a fallback for feeds generated before the robot sent float_days.
  const FD = +((f||{}).float_days) || 55;
  const t = document.getElementById("h1title");
  if (t) t.innerHTML = "Buy &rarr; bank vs your " + FD + "-day float";
  if (!HAS_BANK_FEED) {
    document.getElementById("strip").innerHTML =
        kpi("Avg buy &rarr; bank", "&mdash;", "")
      + kpi("Back within " + FD + " days", "&mdash;", "")
      + kpi("Median &middot; range", "&mdash;", "");
    document.getElementById("out").innerHTML =
      '<div class="view active"><div class="note">'
      + '<b>Your cash cycle unlocks once a bank feed is connected.</b><br>'
      + 'Amazon tells us the day it <b>pays you out</b> &mdash; but not the day the money actually '
      + 'lands in your bank. Connect Monarch (or your bank) and this tile fills in automatically: '
      + 'your real buy&rarr;bank days, how many units beat the ' + FD + '-day card bill, and where capital is tied up.'
      + '</div></div>';
    return;
  }
  const bar = Math.max(0, Math.min(100, +f.bar_pct || 0));
  const win = (+f.avg_days)<=FD;
  document.getElementById("strip").innerHTML =
      kpi("Avg buy &rarr; bank", esc(f.avg_days), " days")
    + kpi("Back within " + FD + " days", esc(f.pct55), "%")
    + kpi("Median &middot; range", esc(f.median_days)+"d", " &middot; "+esc(f.min_days)+"&ndash;"+esc(f.max_days)+"d");

  let h = `<div class="view active">`
    + (BANK_FEED_IS_ESTIMATE
        ? `<div class="note" style="border-color:var(--orange-line);background:var(--orange-wash)">`
          + `<b>🟠 Estimated.</b> These days are based on Amazon&rsquo;s payout date + 1 business day &mdash; `
          + `Amazon tells us when it <b>pays out</b>, not when the cash lands. `
          + `Upload a bank statement (or connect Monarch) later to confirm the exact day.</div>`
        : ``)
    + `<div class="ccbar-lbl">${FD}-day card due &rarr;</div>`
    + `<div class="ccbar"><div class="fill" style="width:${bar}%">${esc(f.avg_days)}d avg</div><div class="due"></div></div>`
    + `<div class="note ${win?"":"warn"}"><b>${win?"You&rsquo;re winning the float on average.":"You&rsquo;re behind the float on average."}</b> `
    + `${esc(f.within55)} of ${esc(f.total_chain)} units come back before the ${FD}-day card bill.</div>`
    + `<div class="twocol">`
    + `<div class="fbox"><h3 style="margin-top:0">Fastest cash back</h3>${rowsHtml(f.fastest,"ok")}</div>`
    + `<div class="fbox"><h3 style="margin-top:0">Slowest &mdash; capital tied up</h3>${rowsHtml(f.slowest,"over")}</div>`
    + `</div>`;
  h += `<h3>Frozen capital</h3><div class="note"><b>${esc(f.frozen_units)} units</b> across ${esc(f.frozen_products)} SKUs are past your ${FD}-day float &mdash; capital bought but not yet back in the bank.`;
  if(!(f.sku_table&&f.sku_table.length)){
    const chips = (f.frozen_top||[]).map(c=>`<span class="chip">${esc(c.name)} &middot; ${esc(c.units)}u</span>`).join("");
    h += `<div class="chips">${chips}</div>`;
  }
  h += `</div>`;
  h += skuTableHtml(f.sku_table);
  h += `</div>`;
  document.getElementById("out").innerHTML = h;
}

function cfTrend(t){
  if(t==="faster") return '<span class="tb up" title="paying back faster than this SKU&rsquo;s average">&#9660; faster</span>';
  if(t==="slower") return '<span class="tb dn" title="paying back slower than this SKU&rsquo;s average">&#9650; slower</span>';
  if(t==="steady") return '<span class="tb fl">steady</span>';
  return '<span class="tb mut" title="not enough completed cycles to call a trend">&mdash;</span>';
}
function skuTableHtml(st){
  if(!st||!st.length) return "";
  let h = `<h3>Every SKU &mdash; payback &amp; what to free up</h3>`
   + `<div class="note" style="margin-top:0">SKUs with capital tied up that are <b>slowing down</b> (paying back slower than their own average) are flagged <b>sell to free cash</b>. The red Frozen number shows capital not yet back. Trend = this SKU&rsquo;s most recent cycles vs its own average.</div>`
   + `<div class="sktbl"><table class="sk"><thead><tr><th class="l">Product</th><th>Avg buy&rarr;bank</th><th>Recent</th><th>Trend</th><th>Cycles</th><th>Frozen</th></tr></thead><tbody>`;
  for(const r of st){
    const flag = (r.frozen_units>0 && r.trend==="slower");
    h += `<tr${flag?' class="free"':''}><td class="l nm" title="${esc(r.name)}">${esc(r.name)}${flag?' <span class="freetag">sell to free cash</span>':''}</td>`
      + `<td>${r.avg_days==null?"&mdash;":esc(r.avg_days)+"d"}</td>`
      + `<td>${r.recent_days==null?"&mdash;":esc(r.recent_days)+"d"}</td>`
      + `<td class="l">${cfTrend(r.trend)}</td>`
      + `<td>${esc(r.cycles)}</td>`
      + `<td${r.frozen_units>0?' class="fz"':''}>${r.frozen_units?esc(r.frozen_units):"&mdash;"}</td></tr>`;
  }
  return h + `</tbody></table></div>`;
}

async function load(){
  const st = document.getElementById("status");
  st.textContent = "Loading…";
  try{
    const r = await window.cowork.callMcpTool(TOOL, { fileId: FILE_ID });
    if(r.isError) throw new Error("connector error: " + JSON.stringify(r.content));
    const wrapper = r.structuredContent ?? JSON.parse(r.content[0].text);
    const f = parseFeed(wrapper.fileContent);
    document.getElementById("asof").textContent = "live · recomputed " + (f.as_of || f.generated_at || "") + " from the Item Journey Repo";
    render(f);
    st.textContent = `✓ live · ${f.total_chain} units · ${new Date().toLocaleTimeString()}`;
  }catch(e){
    st.textContent = "✗ failed";
    document.getElementById("out").innerHTML = `<div class="err">Live load failed:\n${esc(e.message||e)}\n\nThis tile reads its data live inside Cowork — open it there.</div>`;
  }
}
document.getElementById("reload").onclick = load;
load();
</script>
</body></html>
